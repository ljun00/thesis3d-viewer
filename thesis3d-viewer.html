<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mesh Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #0a0c0b;
      --panel:  #0e1210;
      --border: #1e2420;
      --muted:  #3a4840;
      --dim:    #5a7060;
      --text:   #c8d8cc;
      --accent: #4ec98a;
      --adk:    #2a7a52;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    #header {
      height: 46px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 20;
    }
    .logo   { font-size: 11px; letter-spacing: 0.22em; color: var(--dim); }
    .logo b { color: var(--accent); font-weight: normal; }
    #hdr-file { font-size: 11px; color: var(--muted); max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hint-txt { font-size: 10px; color: var(--border); letter-spacing: 0.1em; }

    /* ── SCENE ───────────────────────────────────────────────── */
    #wrap { flex: 1; position: relative; overflow: hidden; }
    #canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── DROP ZONE ───────────────────────────────────────────── */
    #dropzone {
      position: absolute; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg);
    }
    #dropzone.hidden { display: none; }
    #dropzone.over {
      background: #080f0b;
      outline: 2px dashed var(--adk); outline-offset: -14px;
    }
    .dz-icon  { font-size: 36px; color: var(--border); }
    .dz-title { font-size: 12px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }
    .dz-sub   { font-size: 10px; color: var(--border); letter-spacing: 0.08em; }
    #dz-note  { font-size: 10px; color: var(--muted); }

    .fmt-badges { display: flex; gap: 8px; }
    .badge     { padding: 3px 12px; border: 1px solid var(--muted); font-size: 10px; letter-spacing: 0.14em; color: var(--dim); }
    .badge.glb { border-color: var(--accent); color: var(--accent); }

    .browse-btn {
      margin-top: 4px; padding: 9px 28px;
      border: 1px solid var(--muted); background: transparent;
      color: var(--dim); font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .browse-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── LOADING ─────────────────────────────────────────────── */
    #loading {
      position: absolute; inset: 0; z-index: 11;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: var(--bg);
    }
    #loading.hidden { display: none; }
    #ld-msg   { font-size: 11px; letter-spacing: 0.18em; color: var(--dim); }
    #ld-prog  { font-size: 10px; color: var(--muted); min-height: 14px; }
    #ld-track { width: 220px; height: 1px; background: var(--border); }
    #ld-bar   { height: 100%; background: var(--accent); width: 0; transition: width 0.25s; }
    #ld-error {
      display: none; font-size: 11px; color: #e06060;
      border: 1px solid #5a2020; background: #1a0a0a;
      padding: 10px 18px; max-width: 400px;
      text-align: center; line-height: 1.7;
    }

    /* ── TOOLBAR ─────────────────────────────────────────────── */
    #toolbar {
      position: absolute; top: 14px; right: 16px;
      display: none; flex-direction: column; gap: 7px; z-index: 12;
    }
    .tbtn {
      width: 38px; height: 38px;
      background: rgba(14,18,16,0.92); backdrop-filter: blur(4px);
      border: 1px solid var(--border); color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 0.06em; cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .tbtn:hover { border-color: var(--adk); color: var(--text); }
    .tbtn.on    { border-color: var(--accent); color: var(--accent); background: rgba(78,201,138,0.08); }

    /* ── BRIGHTNESS SLIDER ───────────────────────────────────── */
    #brightness-panel {
      position: absolute; bottom: 52px; right: 16px;
      display: none;
      flex-direction: column; gap: 7px;
      background: rgba(14,18,16,0.95); backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      padding: 12px 14px; z-index: 13;
      min-width: 180px;
    }
    #brightness-panel.show { display: flex; }
    .bp-label { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
    .bp-row   { display: flex; align-items: center; gap: 10px; }
    .bp-name  { font-size: 10px; color: var(--dim); width: 60px; }
    .bp-slider { flex: 1; accent-color: var(--accent); cursor: pointer; }
    .bp-val   { font-size: 10px; color: var(--accent); width: 28px; text-align: right; }

    /* ── STATS ───────────────────────────────────────────────── */
    #stats {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 18px;
      display: none; gap: 20px; flex-wrap: wrap; align-items: center;
      background: linear-gradient(transparent, rgba(8,10,9,0.96));
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.1em; pointer-events: none;
    }
    #stats b { color: var(--dim); font-weight: normal; }
    #stat-fmt { padding: 2px 8px; font-size: 9px; letter-spacing: 0.14em; border: 1px solid var(--border); color: var(--dim); }
    #stat-fmt.glb { border-color: var(--accent); color: var(--accent); }

    /* ── TOAST ───────────────────────────────────────────────── */
    #toast {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      padding: 8px 20px; background: var(--panel); border: 1px solid var(--adk);
      color: var(--accent); font-size: 10px; letter-spacing: 0.14em;
      pointer-events: none; z-index: 30;
      opacity: 0; transition: opacity 0.2s; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #file-input { display: none; }
  </style>
</head>
<body>

  <div id="header">
    <div class="logo">3D <b>MESH VIEWER</b></div>
    <div id="hdr-file">no model loaded</div>
    <div class="hint-txt">drag · scroll · right-drag pan</div>
  </div>

  <div id="wrap">
    <canvas id="canvas"></canvas>

    <!-- Drop zone -->
    <div id="dropzone">
      <div class="dz-icon">◈</div>
      <div class="dz-title">Drag & drop your 3D file here</div>
      <div class="fmt-badges">
        <div class="badge glb">GLB</div>
        <div class="badge">GLTF</div>
        <div class="badge">PLY</div>
      </div>
      <div class="dz-sub">or click the button below to browse</div>
      <div id="dz-note"></div>
      <label class="browse-btn">Browse file
        <input type="file" id="file-input" accept=".glb,.gltf,.ply" />
      </label>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden">
      <div id="ld-msg">Loading…</div>
      <div id="ld-prog"></div>
      <div id="ld-track"><div id="ld-bar"></div></div>
      <div id="ld-error"></div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
      <button class="tbtn" id="btn-wf"  title="Toggle wireframe">WF</button>
      <button class="tbtn" id="btn-cam" title="Reset camera view">⌂</button>
      <button class="tbtn" id="btn-clr" title="Toggle solid / original color">CLR</button>
      <button class="tbtn" id="btn-brt" title="Adjust brightness">☀</button>
      <button class="tbtn" id="btn-new" title="Load a different file" style="font-size:8px;">NEW</button>
    </div>

    <!-- Brightness panel -->
    <div id="brightness-panel">
      <div class="bp-label">Brightness</div>
      <div class="bp-row">
        <div class="bp-name">Exposure</div>
        <input type="range" class="bp-slider" id="sl-exposure" min="0.2" max="5" step="0.1" value="1.8" />
        <div class="bp-val" id="val-exposure">1.8</div>
      </div>
      <div class="bp-row">
        <div class="bp-name">Ambient</div>
        <input type="range" class="bp-slider" id="sl-ambient" min="0" max="5" step="0.1" value="1.5" />
        <div class="bp-val" id="val-ambient">1.5</div>
      </div>
      <div class="bp-row">
        <div class="bp-name">Sun</div>
        <input type="range" class="bp-slider" id="sl-sun" min="0" max="8" step="0.1" value="2.5" />
        <div class="bp-val" id="val-sun">2.5</div>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats">
      <span id="stat-fmt">—</span>
      VERTICES <b id="st-v">—</b>
      &nbsp; FACES <b id="st-f">—</b>
      &nbsp; SIZE <b id="st-s">—</b>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module">
    import * as THREE        from 'https://esm.sh/three@0.160.0';
    import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader }    from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { PLYLoader }     from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/PLYLoader.js';

    // ════════════════════════════════════════════════════════════════
    //   ★  CONFIGURATION  ★
    // ════════════════════════════════════════════════════════════════
    // Paste your GitHub raw file URL here to auto-load.
    // Leave as "" to use drag & drop.
    const MODEL_URL = "";
    // ════════════════════════════════════════════════════════════════

    // ── Renderer ─────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const wrap   = document.getElementById('wrap');

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.setClearColor(0x0a0c0b);

    // Color space — required for GLB textures to look correct
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    // Tone mapping — ACESFilmic looks cinematic but needs higher exposure
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.8;   // ← start value; user can adjust with ☀ button

    // ── Scene / Camera ───────────────────────────────────────────────
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      45, wrap.clientWidth / wrap.clientHeight, 0.001, 2000
    );
    camera.position.set(0, 2, 5);

    // ── OrbitControls ────────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping      = true;
    controls.dampingFactor      = 0.05;
    controls.screenSpacePanning = true;

    // ── LIGHTING ─────────────────────────────────────────────────────
    //
    //  GLB files use physically-based materials (PBR).
    //  They need MUCH more light than regular meshes.
    //  We use a 4-light setup that works well for outdoor 3D scans:

    // 1. Hemisphere light — simulates open sky
    //    Sky color from above, ground bounce from below
    const hemiLight = new THREE.HemisphereLight(
      0xc8e0ff,   // sky color  (soft blue)
      0x8a7060,   // ground color (warm brown)
      1.2         // intensity
    );
    scene.add(hemiLight);

    // 2. Ambient light — fills all shadows uniformly
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    // 3. Key / sun light — main directional light from upper right
    const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.5);   // warm white
    sunLight.position.set(5, 10, 7);
    scene.add(sunLight);

    // 4. Fill light — softens shadows from the opposite side
    const fillLight = new THREE.DirectionalLight(0xddeeff, 0.8);
    fillLight.position.set(-5, 4, -5);
    scene.add(fillLight);

    // Grid on the floor
    scene.add(new THREE.GridHelper(20, 60, 0x1e2a22, 0x181e1c));

    // ── Render loop ──────────────────────────────────────────────────
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ── Resize ──────────────────────────────────────────────────────
    window.addEventListener('resize', function () {
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      camera.aspect = wrap.clientWidth / wrap.clientHeight;
      camera.updateProjectionMatrix();
    });

    // ── Model group ──────────────────────────────────────────────────
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    let currentModel = null;
    let currentMats  = [];

    // ── Collect all materials in a model ─────────────────────────────
    function collectMaterials(root) {
      var mats = [];
      root.traverse(function (child) {
        if (child.isMesh) {
          if (Array.isArray(child.material)) {
            child.material.forEach(function (m) { mats.push(m); });
          } else {
            mats.push(child.material);
          }
        }
      });
      return mats;
    }

    // ── Center model and place its BOTTOM on the grid ─────────────────
    //
    //  Previous version placed the BOUNDING BOX CENTER at Y=0
    //  which put the lower half underground.
    //
    //  This version:
    //   1. Normalizes the scale to 2 units
    //   2. Centers on X and Z axes
    //   3. Lifts on Y so the bottom of the model sits exactly on the grid

    function placeOnGrid(root) {
      // Step 1: Get original bounding box
      var box    = new THREE.Box3().setFromObject(root);
      var center = new THREE.Vector3();
      var size   = new THREE.Vector3();
      box.getCenter(center);
      box.getSize(size);
      var maxDim = Math.max(size.x, size.y, size.z);

      // Step 2: Apply uniform scale (normalize to 2 units)
      root.scale.setScalar(2 / maxDim);

      // Step 3: Center on X and Z — but leave Y for now
      root.position.x = -center.x * (2 / maxDim);
      root.position.z = -center.z * (2 / maxDim);
      root.position.y = 0;

      // Step 4: Recompute bounding box AFTER scaling/repositioning
      //         then lift so the bottom (min.y) sits at Y = 0
      var scaledBox = new THREE.Box3().setFromObject(root);
      root.position.y = -scaledBox.min.y;    // ← this is the key fix
    }

    // ── Fit camera to model after placing ────────────────────────────
    function fitCamera(root) {
      var box   = new THREE.Box3().setFromObject(root);
      var bsize = box.getSize(new THREE.Vector3()).length();
      var bctr  = box.getCenter(new THREE.Vector3());

      camera.near = bsize / 100;
      camera.far  = bsize * 100;
      camera.updateProjectionMatrix();

      // Position camera in front and slightly above the model
      camera.position.set(
        bctr.x,
        bctr.y + bsize * 0.3,
        bctr.z + bsize * 1.6
      );
      controls.target.copy(bctr);
      controls.update();
    }

    // ── Count vertices / faces across all meshes ─────────────────────
    function getModelStats(root) {
      var v = 0, f = 0;
      root.traverse(function (child) {
        if (child.isMesh && child.geometry) {
          v += child.geometry.attributes.position.count;
          f += child.geometry.index
            ? Math.floor(child.geometry.index.count / 3)
            : Math.floor(child.geometry.attributes.position.count / 3);
        }
      });
      return { verts: v, faces: f };
    }

    // ── Show model (called after both GLB and PLY load) ───────────────
    function showModel(root, fileName, fileSize, fmt) {
      // Clear previous model from group
      while (modelGroup.children.length > 0) {
        var old = modelGroup.children[0];
        old.traverse(function (child) {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(function (m) { m.dispose(); });
            } else {
              child.material.dispose();
            }
          }
        });
        modelGroup.remove(old);
      }

      modelGroup.add(root);
      currentModel = root;

      // Place on grid + fit camera
      placeOnGrid(root);
      fitCamera(root);

      // Collect materials for wireframe / CLR toggle
      currentMats = collectMaterials(root);

      // Update stats UI
      var s = getModelStats(root);
      document.getElementById('st-v').textContent = s.verts.toLocaleString();
      document.getElementById('st-f').textContent = s.faces.toLocaleString();
      document.getElementById('st-s').textContent = fileSize;

      var fmtEl = document.getElementById('stat-fmt');
      fmtEl.textContent = fmt;
      fmtEl.className   = (fmt === 'GLB' || fmt === 'GLTF') ? 'glb' : '';

      document.getElementById('hdr-file').textContent    = fileName;
      document.getElementById('toolbar').style.display   = 'flex';
      document.getElementById('stats').style.display     = 'flex';
      document.getElementById('loading').classList.add('hidden');

      // Reset toggle states
      isWireframe     = false;
      showingOriginal = true;
      document.getElementById('btn-wf').classList.remove('on');
      document.getElementById('btn-clr').classList.remove('on');
    }

    // ── Parse GLB ────────────────────────────────────────────────────
    function parseGLB(arrayBuffer) {
      return new Promise(function (resolve, reject) {
        new GLTFLoader().parse(arrayBuffer, '', resolve, reject);
      });
    }

    // ── Parse PLY ────────────────────────────────────────────────────
    function parsePLY(arrayBuffer) {
      var geo  = new PLYLoader().parse(arrayBuffer);
      geo.computeVertexNormals();
      var mat  = new THREE.MeshStandardMaterial({
        vertexColors: geo.hasAttribute('color'),
        roughness: 0.72, metalness: 0.06
      });
      var mesh = new THREE.Mesh(geo, mat);

      // Blender exports PLY with Z-up coordinates, while Three.js expects Y-up.
      // Rotate PLY meshes so they appear upright in this viewer.
      mesh.rotation.x = -Math.PI / 2;

      return mesh;
    }

    // ── Load from File ────────────────────────────────────────────────
    async function loadFile(file) {
      var ext = file.name.split('.').pop().toLowerCase();

      document.getElementById('dropzone').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('ld-error').style.display = 'none';
      document.getElementById('ld-msg').textContent     = 'Reading file…';
      document.getElementById('ld-bar').style.width     = '15%';
      document.getElementById('ld-prog').textContent    = file.name;

      try {
        var ab = await file.arrayBuffer();
        document.getElementById('ld-bar').style.width  = '60%';
        document.getElementById('ld-msg').textContent  = 'Parsing model…';

        var root, fmt;
        if (ext === 'glb' || ext === 'gltf') {
          var gltf = await parseGLB(ab);
          root = gltf.scene;
          fmt  = ext === 'glb' ? 'GLB' : 'GLTF';
        } else if (ext === 'ply') {
          root = parsePLY(ab);
          fmt  = 'PLY';
        } else {
          throw new Error('Unsupported format. Use .glb, .gltf, or .ply');
        }

        document.getElementById('ld-bar').style.width = '100%';
        showModel(root, file.name, (file.size / 1048576).toFixed(1) + ' MB', fmt);

      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('ld-msg').textContent     = 'Failed to load';
        document.getElementById('ld-error').textContent   = 'Error: ' + err.message;
        document.getElementById('ld-error').style.display = 'block';
        setTimeout(function () {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('dropzone').classList.remove('hidden');
        }, 3000);
      }
    }

    // ── Load from URL ─────────────────────────────────────────────────
    async function loadURL(url) {
      var ext = url.split('?')[0].split('.').pop().toLowerCase();

      document.getElementById('dropzone').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('ld-error').style.display = 'none';
      document.getElementById('ld-msg').textContent     = 'Downloading model…';
      document.getElementById('ld-bar').style.width     = '5%';

      try {
        var res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);

        var total  = parseInt(res.headers.get('content-length') || '0');
        var reader = res.body.getReader();
        var chunks = [];
        var received = 0;

        while (true) {
          var r = await reader.read();
          if (r.done) break;
          chunks.push(r.value);
          received += r.value.length;
          if (total > 0) {
            document.getElementById('ld-bar').style.width =
              (5 + Math.round(received / total * 80)) + '%';
            document.getElementById('ld-prog').textContent =
              (received / 1048576).toFixed(1) + ' / ' + (total / 1048576).toFixed(1) + ' MB';
          }
        }

        document.getElementById('ld-msg').textContent = 'Parsing model…';
        document.getElementById('ld-bar').style.width = '88%';

        var flat = new Uint8Array(received), off = 0;
        for (var i = 0; i < chunks.length; i++) { flat.set(chunks[i], off); off += chunks[i].length; }

        var root, fmt;
        if (ext === 'glb' || ext === 'gltf') {
          var gltf = await parseGLB(flat.buffer);
          root = gltf.scene; fmt = 'GLB';
        } else {
          root = parsePLY(flat.buffer); fmt = 'PLY';
        }

        document.getElementById('ld-bar').style.width = '100%';
        var name = url.split('/').pop().split('?')[0];
        showModel(root, name, (received / 1048576).toFixed(1) + ' MB', fmt);

      } catch (err) {
        console.error('URL load error:', err);
        document.getElementById('ld-msg').textContent     = 'Download failed';
        document.getElementById('ld-error').textContent   = 'Error: ' + err.message + ' — use drag & drop instead.';
        document.getElementById('ld-error').style.display = 'block';
        setTimeout(function () {
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('dropzone').classList.remove('hidden');
          document.getElementById('dz-note').textContent = '⚠ Auto-load failed. Drop your file here instead.';
        }, 3000);
      }
    }

    // ── Startup ───────────────────────────────────────────────────────
    if (MODEL_URL && MODEL_URL !== '') {
      loadURL(MODEL_URL);
    } else {
      document.getElementById('dz-note').textContent =
        'Set MODEL_URL in the code to auto-load from GitHub';
    }

    // ── Drag & drop ───────────────────────────────────────────────────
    var dz = document.getElementById('dropzone');
    dz.addEventListener('dragover',  function (e) { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', function ()  { dz.classList.remove('over'); });
    dz.addEventListener('drop', function (e) {
      e.preventDefault(); dz.classList.remove('over');
      if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
    });
    document.getElementById('file-input').addEventListener('change', function (e) {
      if (e.target.files[0]) loadFile(e.target.files[0]);
    });

    // ── Toolbar: Wireframe ────────────────────────────────────────────
    var isWireframe = false;
    document.getElementById('btn-wf').addEventListener('click', function () {
      if (!currentModel) return;
      isWireframe = !isWireframe;
      currentMats.forEach(function (m) { m.wireframe = isWireframe; });
      this.classList.toggle('on', isWireframe);
    });

    // ── Toolbar: Reset camera ─────────────────────────────────────────
    document.getElementById('btn-cam').addEventListener('click', function () {
      if (!currentModel) return;
      fitCamera(currentModel);
    });

    // ── Toolbar: Color toggle ─────────────────────────────────────────
    var showingOriginal = true;
    var solidGrayMat = new THREE.MeshStandardMaterial({ color: 0x7a9e85, roughness: 0.7, metalness: 0.05 });

    document.getElementById('btn-clr').addEventListener('click', function () {
      if (!currentModel) return;
      showingOriginal = !showingOriginal;
      currentModel.traverse(function (child) {
        if (!child.isMesh) return;
        if (showingOriginal) {
          if (child._origMat !== undefined) child.material = child._origMat;
        } else {
          if (child._origMat === undefined) child._origMat = child.material;
          child.material = solidGrayMat;
        }
      });
      this.classList.toggle('on', !showingOriginal);
    });

    // ── Toolbar: Brightness panel ─────────────────────────────────────
    document.getElementById('btn-brt').addEventListener('click', function () {
      var panel = document.getElementById('brightness-panel');
      var open  = panel.classList.contains('show');
      panel.classList.toggle('show', !open);
      this.classList.toggle('on', !open);
    });

    // Exposure slider
    document.getElementById('sl-exposure').addEventListener('input', function () {
      var val = parseFloat(this.value);
      renderer.toneMappingExposure = val;
      document.getElementById('val-exposure').textContent = val.toFixed(1);
    });

    // Ambient light slider
    document.getElementById('sl-ambient').addEventListener('input', function () {
      var val = parseFloat(this.value);
      ambientLight.intensity = val;
      document.getElementById('val-ambient').textContent = val.toFixed(1);
    });

    // Sun light slider
    document.getElementById('sl-sun').addEventListener('input', function () {
      var val = parseFloat(this.value);
      sunLight.intensity = val;
      document.getElementById('val-sun').textContent = val.toFixed(1);
    });

    // ── Toolbar: New file ─────────────────────────────────────────────
    document.getElementById('btn-new').addEventListener('click', function () {
      document.getElementById('toolbar').style.display         = 'none';
      document.getElementById('stats').style.display           = 'none';
      document.getElementById('brightness-panel').classList.remove('show');
      document.getElementById('btn-brt').classList.remove('on');
      document.getElementById('hdr-file').textContent          = 'no model loaded';
      document.getElementById('dz-note').textContent           = '';
      dz.classList.remove('hidden');
    });

  </script>
</body>
</html>
