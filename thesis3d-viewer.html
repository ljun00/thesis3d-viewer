<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mesh Viewer</title>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:      #080a09;
      --panel:   #0e1210;
      --border:  #1e2420;
      --muted:   #3a4840;
      --dim:     #5a6e60;
      --text:    #c8d8cc;
      --accent:  #4ec98a;
      --accentd: #2a7a52;
      --warn:    #d4a840;
    }
    body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

    /* Header */
    #header { height:46px; padding:0 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--panel); flex-shrink:0; z-index:20; }
    .logo { font-size:11px; letter-spacing:.22em; color:var(--dim); }
    .logo b { color:var(--accent); font-weight:normal; }
    #hdr-file { font-size:11px; color:var(--muted); letter-spacing:.08em; max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #saved-badge { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); border:1px solid var(--accentd); padding:3px 9px; opacity:0; transition:opacity .3s; }
    #saved-badge.show { opacity:1; }

    /* Scene */
    #scene-wrap { flex:1; position:relative; overflow:hidden; }
    #three-canvas { display:block; width:100% !important; height:100% !important; }
    body.orient-mode          #three-canvas { cursor:crosshair; }
    body.orient-mode.rotating #three-canvas { cursor:grab; }
    body.orient-mode.panning  #three-canvas { cursor:move; }

    /* Drop zone */
    #drop-zone { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:13px; background:var(--bg); }
    #drop-zone.hidden { display:none; }
    #drop-zone.over   { outline:2px dashed var(--accentd); outline-offset:-14px; background:#080f0b; }
    .dz-sym   { font-size:30px; color:var(--border); }
    .dz-title { font-size:11px; letter-spacing:.2em; color:var(--muted); }
    .dz-sub   { font-size:10px; color:var(--border); }
    .browse-btn { margin-top:4px; padding:9px 26px; border:1px solid var(--muted); background:transparent; color:var(--dim); font-family:'Courier New',monospace; font-size:10px; letter-spacing:.14em; cursor:pointer; transition:all .2s; }
    .browse-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* Loading */
    #loading { position:absolute; inset:0; z-index:11; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; background:var(--bg); }
    #loading.hidden { display:none; }
    .ld-msg   { font-size:11px; letter-spacing:.18em; color:var(--dim); }
    .ld-prog  { font-size:10px; color:var(--muted); min-height:14px; }
    .ld-track { width:200px; height:1px; background:var(--border); }
    .ld-bar   { height:100%; background:var(--accent); width:0; transition:width .25s; }

    /* Orient banner */
    #orient-banner { position:absolute; top:0; left:0; right:0; z-index:16; padding:10px 18px; background:rgba(10,16,12,0.97); border-bottom:1px solid var(--accentd); display:none; flex-direction:column; gap:9px; backdrop-filter:blur(4px); }
    #orient-banner.show { display:flex; }
    .ob-row { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .ob-title { font-size:10px; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; flex-shrink:0; }
    .hints { display:flex; gap:8px; flex-wrap:wrap; }
    .hint-pill { padding:3px 10px; border:1px solid var(--border); font-size:9px; letter-spacing:.08em; color:var(--muted); display:flex; align-items:center; gap:5px; }
    .hint-pill kbd { background:var(--border); color:var(--dim); padding:1px 5px; font-family:'Courier New',monospace; font-size:9px; }
    .ob-vals { display:flex; gap:14px; margin-left:auto; flex-wrap:wrap; }
    .ob-val  { font-size:10px; color:var(--muted); white-space:nowrap; }
    .ob-val span { color:var(--accent); display:inline-block; min-width:44px; text-align:right; }
    .ob-actions { display:flex; gap:7px; flex-wrap:wrap; }
    .ob-btn { padding:5px 14px; border:1px solid var(--muted); background:transparent; color:var(--dim); font-family:'Courier New',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .ob-btn:hover { border-color:var(--accent); color:var(--accent); }
    .ob-btn.save-btn { border-color:var(--accent); color:var(--accent); background:rgba(78,201,138,0.07); }
    .ob-btn.save-btn:hover { background:rgba(78,201,138,0.15); }
    .ob-btn.center-btn { border-color:var(--warn); color:var(--warn); }
    .ob-btn.center-btn:hover { background:rgba(212,168,64,0.1); }

    /* Toolbar */
    #toolbar { position:absolute; top:14px; right:16px; display:none; flex-direction:column; gap:7px; z-index:12; }
    .tbtn { width:38px; height:38px; background:rgba(14,18,16,0.9); backdrop-filter:blur(4px); border:1px solid var(--border); color:var(--muted); font-family:'Courier New',monospace; font-size:10px; letter-spacing:.06em; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
    .tbtn:hover { border-color:var(--accentd); color:var(--text); }
    .tbtn.on    { border-color:var(--accent); color:var(--accent); background:rgba(78,201,138,0.08); }

    /* Stats */
    #stats { position:absolute; bottom:0; left:0; right:0; padding:10px 18px; display:none; gap:20px; flex-wrap:wrap; align-items:center; background:linear-gradient(transparent, rgba(8,10,9,0.96)); font-size:10px; color:var(--muted); letter-spacing:.1em; pointer-events:none; }
    #stats b { color:var(--dim); font-weight:normal; }

    /* Toast */
    #toast { position:absolute; top:60px; left:50%; transform:translateX(-50%); padding:8px 20px; background:var(--panel); border:1px solid var(--accentd); color:var(--accent); font-size:10px; letter-spacing:.16em; pointer-events:none; z-index:30; opacity:0; transition:opacity .2s; white-space:nowrap; }
    #toast.show { opacity:1; }
    #file-input { display:none; }
  </style>
</head>
<body>

  <div id="header">
    <div class="logo">3D <b>MESH VIEWER</b></div>
    <div id="hdr-file">no model loaded</div>
    <div id="saved-badge">✓ position saved</div>
  </div>

  <div id="scene-wrap">
    <canvas id="three-canvas"></canvas>

    <div id="drop-zone">
      <div class="dz-sym">◈</div>
      <div class="dz-title">Drag & Drop .ply file here</div>
      <div class="dz-sub" id="url-note"></div>
      <label class="browse-btn">Browse file <input type="file" id="file-input" accept=".ply" /></label>
    </div>

    <div id="loading" class="hidden">
      <div class="ld-msg" id="ld-msg">Loading…</div>
      <div class="ld-prog" id="ld-prog"></div>
      <div class="ld-track"><div class="ld-bar" id="ld-bar"></div></div>
    </div>

    <div id="orient-banner">
      <div class="ob-row">
        <div class="ob-title">⟳ Positioning Mode</div>
        <div class="hints">
          <div class="hint-pill"><kbd>Drag</kbd> Rotate model</div>
          <div class="hint-pill"><kbd>Shift</kbd> + <kbd>Drag</kbd> Move up / down / left / right</div>
          <div class="hint-pill"><kbd>Esc</kbd> Exit</div>
        </div>
        <div class="ob-vals">
          <div class="ob-val">RX <span id="rv-x">0°</span></div>
          <div class="ob-val">RY <span id="rv-y">0°</span></div>
          <div class="ob-val">Y pos <span id="pv-y">0.00</span></div>
        </div>
      </div>
      <div class="ob-row">
        <div class="ob-actions">
          <button class="ob-btn center-btn" id="ob-center">Place on Grid</button>
          <button class="ob-btn" id="ob-reset">Reset</button>
          <button class="ob-btn save-btn" id="ob-save">💾 Save Position (Permanent)</button>
          <button class="ob-btn" id="ob-copy">Copy Code Values</button>
          <button class="ob-btn" id="ob-exit">Done ✓</button>
        </div>
      </div>
    </div>

    <div id="toolbar">
      <button class="tbtn" id="btn-orient" title="Position model">POS</button>
      <button class="tbtn" id="btn-wf"     title="Toggle wireframe">WF</button>
      <button class="tbtn" id="btn-rst"    title="Reset camera">⌂</button>
      <button class="tbtn" id="btn-clr"    title="Toggle vertex color">CLR</button>
      <button class="tbtn" id="btn-new"    style="font-size:8px" title="New file">NEW</button>
    </div>

    <div id="stats">
      VERTICES <b id="sv">—</b> &nbsp;
      FACES <b id="sf">—</b> &nbsp;
      SIZE <b id="ss">—</b> &nbsp;
      COLORS <b id="sc">—</b>
      <span style="margin-left:auto;color:var(--border)">drag · scroll · right-drag pan</span>
    </div>

    <div id="toast"></div>
  </div>

  <script type="module">
    import * as THREE        from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { PLYLoader }     from 'three/addons/loaders/PLYLoader.js';

    // ═══════════════════════════════════════════════════════════════════
    //  ★  CONFIGURATION — edit these lines before uploading to GitHub  ★
    // ═══════════════════════════════════════════════════════════════════

    // URL of your .ply file hosted on GitHub (leave "" for drag & drop)
    const MODEL_URL = "";

    // Default rotation in degrees (use POS button to find correct values,
    // then click "Copy Code Values" and paste here)
    const MODEL_ROTATION = { x: -90, y: 0, z: 0 };

    // Default position offset (vertical lift off the grid, etc.)
    const MODEL_OFFSET = { x: 0, y: 0, z: 0 };

    // ═══════════════════════════════════════════════════════════════════

    const STORAGE_KEY = 'thesis-viewer-v2';
    const R2D = 180 / Math.PI;
    const D2R = Math.PI / 180;

    // ── Renderer ──────────────────────────────────────────────────────
    const canvas = document.getElementById('three-canvas');
    const wrap   = document.getElementById('scene-wrap');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.setClearColor(0x080a09);

    // ── Scene / Camera ─────────────────────────────────────────────
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.001, 2000);
    camera.position.set(0, 1.5, 5);

    // ── OrbitControls ──────────────────────────────────────────────
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping     = true;
    controls.dampingFactor     = 0.05;
    controls.screenSpacePanning = true;

    // ── Lights ─────────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 0.85); key.position.set(5, 10, 7); scene.add(key);
    const fill = new THREE.DirectionalLight(0xddeeff, 0.3); fill.position.set(-5, 3, -5); scene.add(fill);
    const bot  = new THREE.DirectionalLight(0xffeedd, 0.2); bot.position.set(0, -8, 0);  scene.add(bot);
    scene.add(new THREE.GridHelper(20, 60, 0x181e1c, 0x131815));

    // Render loop
    (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

    // Resize
    window.addEventListener('resize', () => {
      renderer.setSize(wrap.clientWidth, wrap.clientHeight);
      camera.aspect = wrap.clientWidth / wrap.clientHeight;
      camera.updateProjectionMatrix();
    });

    // ── meshGroup ──────────────────────────────────────────────────
    //
    //  All user positioning (rotation + up/down) goes on meshGroup.
    //  The centering offset goes on mesh inside meshGroup.
    //  This keeps them separate and clean.
    //
    //   scene
    //    └── meshGroup  ← you rotate/move this
    //          └── mesh ← auto-centered here

    const meshGroup = new THREE.Group();
    scene.add(meshGroup);

    let mesh = null, mat = null;
    let orientMode = false, isDragging = false;
    let lastMX = 0, lastMY = 0;

    // ── ORIENT MODE MOUSE HANDLING ─────────────────────────────────
    //
    //  Plain drag   → rotate the model (Y axis = left/right, X = up/down tilt)
    //  Shift + drag → move the model   (like Blender Shift+Middle Mouse)
    //                 left/right = X axis, up/down = Y axis

    renderer.domElement.addEventListener('mousedown', (e) => {
      if (!orientMode || e.button !== 0) return;
      isDragging = true;
      lastMX = e.clientX; lastMY = e.clientY;
      document.body.classList.add(e.shiftKey ? 'panning' : 'rotating');
    });

    window.addEventListener('mousemove', (e) => {
      if (!orientMode || !isDragging) return;
      const dx = e.clientX - lastMX;
      const dy = e.clientY - lastMY;
      lastMX = e.clientX; lastMY = e.clientY;

      if (e.shiftKey) {
        // MOVE — like Blender's Shift+Middle Mouse pan
        // Horizontal drag = slide left/right (X)
        // Vertical drag   = slide up/down (Y) — note: screen Y is flipped
        meshGroup.position.x += dx * 0.004;
        meshGroup.position.y -= dy * 0.004;
      } else {
        // ROTATE
        meshGroup.rotation.y += dx * 0.009;
        meshGroup.rotation.x += dy * 0.009;
      }
      syncDisplay();
    });

    window.addEventListener('mouseup', () => {
      isDragging = false;
      document.body.classList.remove('rotating', 'panning');
    });

    // Touch (mobile — single finger = rotate)
    renderer.domElement.addEventListener('touchstart', (e) => {
      if (!orientMode || e.touches.length !== 1) return;
      isDragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
    });
    window.addEventListener('touchmove', (e) => {
      if (!orientMode || !isDragging || e.touches.length !== 1) return;
      const dx = e.touches[0].clientX - lastMX;
      const dy = e.touches[0].clientY - lastMY;
      lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
      meshGroup.rotation.y += dx * 0.009;
      meshGroup.rotation.x += dy * 0.009;
      syncDisplay();
    });
    window.addEventListener('touchend', () => { isDragging = false; });

    function syncDisplay() {
      document.getElementById('rv-x').textContent = (meshGroup.rotation.x * R2D).toFixed(1) + '°';
      document.getElementById('rv-y').textContent = (meshGroup.rotation.y * R2D).toFixed(1) + '°';
      document.getElementById('pv-y').textContent = meshGroup.position.y.toFixed(2);
    }

    function enterOrientMode() {
      orientMode = true; controls.enabled = false;
      document.body.classList.add('orient-mode');
      document.getElementById('orient-banner').classList.add('show');
      document.getElementById('btn-orient').classList.add('on');
      syncDisplay();
    }

    function exitOrientMode() {
      orientMode = false; isDragging = false; controls.enabled = true;
      document.body.classList.remove('orient-mode', 'rotating', 'panning');
      document.getElementById('orient-banner').classList.remove('show');
      document.getElementById('btn-orient').classList.remove('on');
    }

    // ── SAVE / LOAD (localStorage) ─────────────────────────────────
    //
    //  localStorage is built into every browser — it's a tiny storage
    //  that persists after closing the tab. Free, no server needed.
    //  The saved position is tied to the URL of the page, so it works
    //  perfectly for a GitHub Pages deployment.

    function saveTransform() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          rx: meshGroup.rotation.x, ry: meshGroup.rotation.y, rz: meshGroup.rotation.z,
          px: meshGroup.position.x, py: meshGroup.position.y, pz: meshGroup.position.z,
        }));
        document.getElementById('saved-badge').classList.add('show');
        showToast('✓  Position saved permanently to this browser');
      } catch {
        showToast('Could not save — try a non-private browser tab');
      }
    }

    function applySaved() {
      try {
        const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!d) return false;
        meshGroup.rotation.set(d.rx, d.ry, d.rz);
        meshGroup.position.set(d.px, d.py, d.pz);
        syncDisplay();
        return true;
      } catch { return false; }
    }

    // ── BUILD MESH ──────────────────────────────────────────────────
    function buildMesh(geometry, name, sizeStr) {
      geometry.computeVertexNormals();
      const hasColor = geometry.hasAttribute('color');

      mat = new THREE.MeshStandardMaterial({ vertexColors: hasColor, roughness: 0.72, metalness: 0.06 });
      const m = new THREE.Mesh(geometry, mat);

      // Auto-center
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const center = new THREE.Vector3(); box.getCenter(center);
      const size   = new THREE.Vector3(); box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      m.position.set(-center.x, -center.y, -center.z);
      m.scale.setScalar(2 / maxDim);

      // Clear old
      while (meshGroup.children.length) {
        const old = meshGroup.children[0];
        old.geometry?.dispose(); old.material?.dispose(); meshGroup.remove(old);
      }
      meshGroup.add(m); mesh = m;

      // Restore saved OR apply config defaults
      const hadSaved = applySaved();
      if (!hadSaved) {
        meshGroup.rotation.set(MODEL_ROTATION.x * D2R, MODEL_ROTATION.y * D2R, MODEL_ROTATION.z * D2R);
        meshGroup.position.set(MODEL_OFFSET.x, MODEL_OFFSET.y, MODEL_OFFSET.z);
      } else {
        document.getElementById('saved-badge').classList.add('show');
        showToast('Restored your saved position');
      }

      // Fit camera
      const b2 = new THREE.Box3().setFromObject(meshGroup);
      const fSz = b2.getSize(new THREE.Vector3()).length();
      const fCt = b2.getCenter(new THREE.Vector3());
      camera.near = fSz / 100; camera.far = fSz * 100; camera.updateProjectionMatrix();
      camera.position.copy(fCt); camera.position.z += fSz * 1.7;
      controls.target.copy(fCt); controls.update();

      // Stats
      const verts = geometry.attributes.position.count;
      const faces = geometry.index ? geometry.index.count / 3 : verts / 3;
      document.getElementById('sv').textContent = verts.toLocaleString();
      document.getElementById('sf').textContent = Math.floor(faces).toLocaleString();
      document.getElementById('ss').textContent = sizeStr;
      document.getElementById('sc').textContent = hasColor ? 'YES' : 'NONE';
      document.getElementById('hdr-file').textContent = name;
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('stats').style.display   = 'flex';
      document.getElementById('loading').classList.add('hidden');
    }

    // ── LOAD FROM URL ───────────────────────────────────────────────
    async function loadFromURL(url) {
      document.getElementById('drop-zone').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('ld-msg').textContent = 'Downloading model…';
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const total = parseInt(res.headers.get('content-length') || '0');
        const reader = res.body.getReader();
        const chunks = []; let received = 0;
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          chunks.push(value); received += value.length;
          if (total) {
            document.getElementById('ld-bar').style.width = (5 + Math.round(received/total*85)) + '%';
            document.getElementById('ld-prog').textContent = (received/1048576).toFixed(1)+' / '+(total/1048576).toFixed(1)+' MB';
          }
        }
        document.getElementById('ld-msg').textContent = 'Parsing mesh…';
        document.getElementById('ld-bar').style.width = '92%';
        const flat = new Uint8Array(received); let off = 0;
        for (const c of chunks) { flat.set(c, off); off += c.length; }
        const geo = new PLYLoader().parse(flat.buffer);
        document.getElementById('ld-bar').style.width = '100%';
        buildMesh(geo, url.split('/').pop().split('?')[0], (received/1048576).toFixed(1)+' MB');
      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
        document.getElementById('url-note').textContent = '⚠ Auto-load failed (' + err.message + '). Use drag & drop.';
      }
    }

    // ── LOAD FROM FILE ──────────────────────────────────────────────
    async function loadFromFile(file) {
      document.getElementById('drop-zone').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('ld-msg').textContent = 'Parsing mesh…';
      document.getElementById('ld-bar').style.width = '30%';
      try {
        const ab = await file.arrayBuffer();
        document.getElementById('ld-bar').style.width = '75%';
        const geo = new PLYLoader().parse(ab);
        document.getElementById('ld-bar').style.width = '100%';
        buildMesh(geo, file.name, (file.size/1048576).toFixed(1)+' MB');
      } catch (err) {
        console.error(err);
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('drop-zone').classList.remove('hidden');
      }
    }

    // Startup
    if (MODEL_URL) {
      loadFromURL(MODEL_URL);
    } else {
      document.getElementById('url-note').textContent = 'Set MODEL_URL in the code to auto-load from GitHub';
    }

    // Drag & drop
    const dz = document.getElementById('drop-zone');
    dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
    dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
    dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) loadFromFile(e.dataTransfer.files[0]); });
    document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) loadFromFile(e.target.files[0]); });

    // ── TOOLBAR ─────────────────────────────────────────────────────
    document.getElementById('btn-orient').addEventListener('click', () => orientMode ? exitOrientMode() : enterOrientMode());

    let wireframe = false;
    document.getElementById('btn-wf').addEventListener('click', function() {
      if (!mat) return; wireframe = !wireframe; mat.wireframe = wireframe; this.classList.toggle('on', wireframe);
    });

    document.getElementById('btn-rst').addEventListener('click', () => {
      if (!mesh) return;
      const b = new THREE.Box3().setFromObject(meshGroup);
      const s = b.getSize(new THREE.Vector3()).length();
      const c = b.getCenter(new THREE.Vector3());
      camera.position.copy(c); camera.position.z += s * 1.7; controls.target.copy(c); controls.update();
    });

    let showVC = true;
    document.getElementById('btn-clr').addEventListener('click', function() {
      if (!mat || !mesh) return; showVC = !showVC;
      const has = mesh.geometry.hasAttribute('color');
      mat.vertexColors = showVC && has; mat.color.set(showVC && has ? 0xffffff : 0x6e9e80);
      mat.needsUpdate = true; this.classList.toggle('on', !showVC);
    });

    document.getElementById('btn-new').addEventListener('click', () => {
      exitOrientMode();
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('stats').style.display   = 'none';
      document.getElementById('hdr-file').textContent  = 'no model loaded';
      document.getElementById('saved-badge').classList.remove('show');
      dz.classList.remove('hidden');
    });

    // ── ORIENT BANNER ACTIONS ────────────────────────────────────────
    document.getElementById('ob-save').addEventListener('click', saveTransform);

    // Place model base on grid (floor = Y 0)
    document.getElementById('ob-center').addEventListener('click', () => {
      if (!mesh) return;
      const b = new THREE.Box3().setFromObject(meshGroup);
      meshGroup.position.y -= b.min.y;
      syncDisplay(); showToast('Model placed on grid floor');
    });

    document.getElementById('ob-reset').addEventListener('click', () => {
      meshGroup.rotation.set(MODEL_ROTATION.x * D2R, MODEL_ROTATION.y * D2R, MODEL_ROTATION.z * D2R);
      meshGroup.position.set(MODEL_OFFSET.x, MODEL_OFFSET.y, MODEL_OFFSET.z);
      syncDisplay();
    });

    document.getElementById('ob-copy').addEventListener('click', () => {
      const rx = (meshGroup.rotation.x * R2D).toFixed(2);
      const ry = (meshGroup.rotation.y * R2D).toFixed(2);
      const rz = (meshGroup.rotation.z * R2D).toFixed(2);
      const px = meshGroup.position.x.toFixed(4);
      const py = meshGroup.position.y.toFixed(4);
      const pz = meshGroup.position.z.toFixed(4);
      navigator.clipboard.writeText(
        `const MODEL_ROTATION = { x: ${rx}, y: ${ry}, z: ${rz} };\nconst MODEL_OFFSET   = { x: ${px}, y: ${py}, z: ${pz} };`
      ).then(() => showToast('Copied! Paste into CONFIG section of the HTML (around line 20)'));
    });

    document.getElementById('ob-exit').addEventListener('click', exitOrientMode);
    window.addEventListener('keydown', e => { if (e.key === 'Escape') exitOrientMode(); });

    // Toast
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
    }
  </script>
</body>
</html>
